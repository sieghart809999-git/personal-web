<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人化資訊儀表板 (GitHub 穩定版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen selection:bg-emerald-500 selection:text-white">

    <header class="border-b border-gray-800 bg-gray-900/80 backdrop-blur sticky top-0 z-50 px-4 py-4">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-emerald-400 flex items-center gap-2">
                <i data-lucide="layout-dashboard"></i> 我的專屬儀表板
            </h1>
            <div id="live-time" class="text-sm text-gray-400 font-mono font-medium">載入時間中...</div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="space-y-6 lg:col-span-1">
            <section class="bg-gray-800/40 border border-gray-800/80 rounded-2xl p-5 backdrop-blur-md">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base font-semibold flex items-center gap-2">
                        <i data-lucide="cloud-sun" class="text-blue-400"></i> 即時天氣
                    </h2>
                    <button id="btn-location" class="text-[11px] bg-emerald-600/80 hover:bg-emerald-500 text-white px-2 py-1 rounded-lg transition flex items-center gap-1 font-medium">
                        <i data-lucide="map-pin" class="w-3 h-3"></i> 自動定位
                    </button>
                </div>
                <div class="text-center py-3 border-b border-gray-700/40">
                    <p id="weather-location" class="text-gray-400 text-sm font-medium">台中市南區 (預設)</p>
                    <div class="text-5xl font-black my-2 text-white tracking-tighter" id="weather-temp">--°C</div>
                    <p id="weather-desc" class="text-sm text-gray-200">連線中...</p>
                    <p id="weather-pop" class="text-xs text-blue-300 mt-1 font-medium">今日降雨機率: --%</p>
                </div>
                <div class="grid grid-cols-2 gap-2 pt-4 text-center text-xs">
                    <div class="bg-gray-800/60 p-2 rounded-xl border border-gray-700/30">
                        <p class="text-gray-400 font-medium">明天</p>
                        <p id="forecast-day1-temp" class="font-semibold mt-1 text-white">--</p>
                    </div>
                    <div class="bg-gray-800/60 p-2 rounded-xl border border-gray-700/30">
                        <p class="text-gray-400 font-medium">後天</p>
                        <p id="forecast-day2-temp" class="font-semibold mt-1 text-white">--</p>
                    </div>
                </div>
            </section>

            <section class="bg-gray-800/40 border border-gray-800/80 rounded-2xl p-5 backdrop-blur-md">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base font-semibold flex items-center gap-2">
                        <i data-lucide="trending-up" class="text-emerald-400"></i> 台灣股市
                    </h2>
                    <span class="text-[10px] bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded font-mono">Worker 轉運</span>
                </div>
                <div class="space-y-3" id="stock-list">
                    <div class="flex justify-between items-center bg-gray-800/60 p-3 rounded-xl border border-gray-700/30">
                        <div>
                            <p class="font-bold text-sm">台積電</p>
                            <p class="text-[10px] text-gray-500 font-mono">2330.TW</p>
                        </div>
                        <div class="text-right">
                            <p class="font-mono font-bold text-white text-base" id="stock-2330-price">讀取中...</p>
                            <p class="text-xs font-mono font-medium" id="stock-2330-change">--</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-gray-800/60 p-3 rounded-xl border border-gray-700/30">
                        <div>
                            <p class="font-bold text-sm">元大台灣50</p>
                            <p class="text-[10px] text-gray-500 font-mono">0050.TW</p>
                        </div>
                        <div class="text-right">
                            <p class="font-mono font-bold text-white text-base" id="stock-0050-price">讀取中...</p>
                            <p class="text-xs font-mono font-medium" id="stock-0050-change">--</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="lg:col-span-2 bg-gray-800/40 border border-gray-800/80 rounded-2xl p-5 backdrop-blur-md flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-base font-semibold flex items-center gap-2">
                    <i data-lucide="newspaper" class="text-purple-400"></i> 即時焦點新聞
                </h2>
            </div>
            
            <div class="flex border-b border-gray-700 mb-4 overflow-x-auto no-scrollbar whitespace-nowrap gap-2">
                <button onclick="switchNewsTab('finance')" id="tab-finance" class="px-3 py-2 text-sm font-medium border-b-2 border-emerald-500 text-emerald-400 transition">Yahoo股市新聞</button>
                <button onclick="switchNewsTab('headlines')" id="tab-headlines" class="px-3 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition">公視新聞網</button>
                <button onclick="switchNewsTab('tech')" id="tab-tech" class="px-3 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition">科技新報</button>
            </div>

            <div id="news-container" class="space-y-3 flex-1 overflow-y-auto max-h-[580px] pr-1 no-scrollbar">
                <div class="text-center py-12 text-gray-500 text-sm">正在建立安全連線...</div>
            </div>
        </div>

        <div class="lg:col-span-1 bg-gray-800/40 border border-gray-800/80 rounded-2xl p-5 backdrop-blur-md flex flex-col h-fit">
            <h2 class="text-base font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="video" class="text-red-400"></i> 24H 新聞直播
            </h2>
            <div class="relative w-full aspect-video rounded-xl overflow-hidden border border-gray-700/60 bg-black">
                <iframe 
                    class="absolute top-0 left-0 w-full h-full"
                    src="https://www.youtube.com/embed/live_stream?channel=UC5nwNW4KdC0SzrhF9BXEYOQ" 
                    title="24H 新聞串流直播" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
            <p class="text-[11px] text-gray-400 mt-3 leading-relaxed">
                已綁定 24 小時高畫質持續性直播源，採用動態串流追蹤技術，享受最穩定的即時觀看體驗。
            </p>
        </div>

    </main>

    <script>
        lucide.createIcons();

        const WORKER_BASE_URL = 'https://personal-web.sieghart809999.workers.dev';

        function updateTime() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleString('zh-TW', { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 台灣股市
        async function fetchStockData() {
            const stocks = ['2330.TW', '0050.TW'];
            for (let symbol of stocks) {
                const id = symbol.split('.')[0];
                try {
                    const res = await fetch(`${WORKER_BASE_URL}/api/stock?symbol=${symbol}`);
                    if (!res.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${res.status}`);
                    const data = await res.json();
                    
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice;
                    const prevClose = meta.chartPreviousClose;
                    const changePercent = ((price - prevClose) / prevClose) * 100;

                    document.getElementById(`stock-${id}-price`).innerText = price.toLocaleString('zh-TW', {minimumFractionDigits: 2});
                    const changeEl = document.getElementById(`stock-${id}-change`);
                    
                    if (changePercent >= 0) {
                        changeEl.innerText = `+${changePercent.toFixed(2)}%`;
                        changeEl.className = "text-xs font-mono font-bold text-red-400";
                    } else {
                        changeEl.innerText = `${changePercent.toFixed(2)}%`;
                        changeEl.className = "text-xs font-mono font-bold text-green-400";
                    }
                } catch (error) {
                    document.getElementById(`stock-${id}-price`).innerText = "連線失敗";
                    document.getElementById(`stock-${id}-change`).innerText = "請檢查 CORS 或後台路徑";
                    console.error(`股票 ${symbol} 讀取失敗:`, error);
                }
            }
        }

        // 天氣觀測站數據
        async function fetchWeatherData(lat = 24.12, lon = 120.66, locationName = "台中市南區 (預設)") {
            try {
                document.getElementById('weather-location').innerText = locationName;
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTaipei`);
                const data = await res.json();
                
                const current = data.current_weather;
                document.getElementById('weather-temp').innerText = `${Math.round(current.temperature)}°C`;
                document.getElementById('weather-desc').innerText = getWeatherDesc(current.weathercode);
                
                const daily = data.daily;
                document.getElementById('weather-pop').innerText = `今日最高降雨機率: ${daily.precipitation_probability_max[0]}%`;
                document.getElementById('forecast-day1-temp').innerText = `${Math.round(daily.temperature_2m_min[1])} ~ ${Math.round(daily.temperature_2m_max[1])}°C`;
                document.getElementById('forecast-day2-temp').innerText = `${Math.round(daily.temperature_2m_min[2])} ~ ${Math.round(daily.temperature_2m_max[2])}°C`;
            } catch (error) {
                console.error("天氣數據讀取失敗:", error);
            }
        }

        // 天氣代碼對照
        function getWeatherDesc(code) {
            const mapping = { 0: "晴朗無雲", 1: "晴間多雲", 2: "多雲", 3: "陰天", 45: "局部大霧", 51: "輕微毛毛雨", 61: "局部微雨", 63: "陣雨天氣", 65: "有大雨", 71: "局部陣雪", 95: "雷陣雨" };
            return mapping[code] || "多雲時晴";
        }

        // 自動定位
        document.getElementById('btn-location').addEventListener('click', () => {
            if (navigator.geolocation) {
                document.getElementById('weather-location').innerText = "精確定位中...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        fetchWeatherData(lat, lon, `目前定位 (東經${lon.toFixed(1)}°, 北緯${lat.toFixed(1)}°)`);
                    },
                    () => { alert("定位失敗，採用預設值"); fetchWeatherData(); }
                );
            }
        });

        // 焦點新聞
        async function fetchNewsData(category) {
            const container = document.getElementById('news-container');
            container.innerHTML = `<div class="text-center py-12 text-gray-500 animate-pulse text-sm">正在從雲端轉運站解碼最新新聞...</div>`;
            
            let workerPath = '';
            let sourceName = '';
            
            if (category === 'finance') {
                workerPath = '/api/news/yahoo-stock';
                sourceName = 'Yahoo股市';
            } else if (category === 'headlines') {
                workerPath = '/api/news/pts';
                sourceName = '公視新聞';
            } else if (category === 'tech') {
                workerPath = '/api/news/technews';
                sourceName = '科技新報';
            }
            
            try {
                const res = await fetch(`${WORKER_BASE_URL}${workerPath}`);
                if (!res.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${res.status}`);
                const text = await res.text();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                
                const parserError = xmlDoc.getElementsByTagName("parsererror");
                if (parserError.length > 0) throw new Error("後台回傳資料非格式正確的 XML 封包");

                // 💡 已修正：自動相容 RSS 的 <item> 與 Atom 的 <entry> 標籤結構
                let items = xmlDoc.getElementsByTagName("item");
                let isAtom = false;
                if (items.length === 0) {
                    items = xmlDoc.getElementsByTagName("entry");
                    isAtom = true;
                }
                
                let html = "";
                const maxItems = Math.min(items.length, 10);
                for(let i=0; i<maxItems; i++) {
                    const title = items[i].getElementsByTagName("title")[0]?.textContent || "無標題";
                    
                    // 根據 XML 種類彈性解析 Link 路徑
                    let link = "#";
                    if (isAtom) {
                        const linkEl = items[i].getElementsByTagName("link")[0];
                        link = linkEl?.getAttribute("href") || linkEl?.textContent || "#";
                    } else {
                        link = items[i].getElementsByTagName("link")[0]?.textContent || "#";
                    }
                    
                    const cleanTitle = title.replace(/<!\[CDATA\[|\]\]>/g, '').replace(/&quot;/g, '"');
                    
                    html += `
                        <a href="${link}" target="_blank" class="block p-3.5 bg-gray-800/50 hover:bg-gray-700/40 rounded-xl transition border border-gray-700/30 group">
                            <h3 class="font-medium text-gray-100 group-hover:text-emerald-400 text-sm md:text-base leading-snug line-clamp-2 transition-colors duration-200">
                                ${cleanTitle}
                            </h3>
                            <div class="flex gap-3 text-[11px] text-gray-400 mt-2 font-medium">
                                <span class="text-emerald-500/90">${sourceName}</span>
                                <span>•</span>
                                <span>即時快訊</span>
                            </div>
                        </a>`;
                }
                container.innerHTML = html || `<div class="text-center py-12 text-gray-500 text-sm">新聞源目前沒有資料</div>`;
            } catch (error) {
                container.innerHTML = `<div class="text-center py-12 text-red-400 text-sm">讀取失敗：${error.message}。<br><span class="text-xs text-gray-500">請確認 Cloudflare Worker 已成功更新並配置 CORS。</span></div>`;
                console.error(`新聞 ${category} 讀取失敗:`, error);
            }
        }

        // 切換新聞分頁
        function switchNewsTab(tabName) {
            const tabs = ['finance', 'headlines', 'tech'];
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    el.classList.remove('border-transparent', 'text-gray-400');
                    el.classList.add('border-emerald-500', 'text-emerald-400');
                } else {
                    el.classList.remove('border-emerald-500', 'text-emerald-400');
                    el.classList.add('border-transparent', 'text-gray-400');
                }
            });
            fetchNewsData(tabName);
        }

        // 初始化
        function init() {
            fetchStockData();
            fetchWeatherData();
            fetchNewsData('finance');
            setInterval(() => { fetchStockData(); fetchWeatherData(); }, 60000);
        }
        init();
    </script>
</body>
</html>
